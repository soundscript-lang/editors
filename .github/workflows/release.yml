name: Release Extension

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to upload and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-extension:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: soundscript-lang/soundscript
          path: soundscript

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build and verify the VSIX
        run: npm run package:vscode

      - name: Upload VSIX to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VSIX_PATH="$(echo packages/vscode/soundscript-vscode-*.vsix)"
          gh release upload "$RELEASE_TAG" "$VSIX_PATH" --clobber

      - name: Publish to Visual Studio Marketplace
        if: ${{ secrets.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm --workspace soundscript-vscode run publish

      - name: Marketplace secret missing
        if: ${{ secrets.VSCE_PAT == '' }}
        run: echo "VSCE_PAT is not configured; skipping Visual Studio Marketplace publish."

      - name: Publish to OpenVSX
        if: ${{ secrets.OVSX_PAT != '' }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          SOUNDSCRIPT_SKIP_PACKAGE_VSCODE: '1'
        run: npm run release:publish:openvsx

      - name: OpenVSX secret missing
        if: ${{ secrets.OVSX_PAT == '' }}
        run: echo "OVSX_PAT is not configured; skipping OpenVSX publish."
